name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selenium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r selenium_tests/requirements.txt
      - name: Run Selenium tests
        run: pytest selenium_tests/tests -v --headless

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r playwright_tests/requirements.txt
      - name: Install browsers
        run: playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pytest playwright_tests/tests -v --headless
